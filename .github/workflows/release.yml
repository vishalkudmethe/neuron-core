name: Release — Build & Publish Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows x86_64 ──────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename artifact
        run: |
          copy target\x86_64-pc-windows-msvc\release\neuron.exe neuron-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuron-windows-x86_64
          path: neuron-windows-x86_64.exe

  # ── macOS ARM64 (Apple Silicon M1/M2/M3/M4) ─────────────────────────────────
  build-macos-arm:
    name: Build macOS (Apple Silicon ARM64)
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Rename artifact
        run: cp target/aarch64-apple-darwin/release/neuron neuron-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuron-macos-arm64
          path: neuron-macos-arm64

  # ── macOS Intel x86_64 ───────────────────────────────────────────────────────
  build-macos-intel:
    name: Build macOS (Intel x86_64)
    runs-on: macos-13
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build release binary
        run: cargo build --release --target x86_64-apple-darwin

      - name: Rename artifact
        run: cp target/x86_64-apple-darwin/release/neuron neuron-macos-intel-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuron-macos-intel-x86_64
          path: neuron-macos-intel-x86_64

  # ── Create GitHub Release & Attach All Binaries ──────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Publish release with binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "Project Neuron ${{ github.ref_name }}"
          body: |
            ## Project Neuron ${{ github.ref_name }} — Production Release

            ### Downloads
            | Platform | Architecture | File |
            |---|---|---|
            | Windows | x86_64 | `neuron-windows-x86_64.exe` |
            | macOS | Apple Silicon (M1/M2/M3/M4) | `neuron-macos-arm64` |
            | macOS | Intel | `neuron-macos-intel-x86_64` |

            ### Installation
            **Windows:**
            ```powershell
            # Move binary to a folder in your PATH
            Move-Item neuron-windows-x86_64.exe C:\Users\$env:USERNAME\bin\neuron.exe
            ```

            **macOS (Apple Silicon):**
            ```bash
            chmod +x neuron-macos-arm64
            sudo mv neuron-macos-arm64 /usr/local/bin/neuron
            ```

            **macOS (Intel):**
            ```bash
            chmod +x neuron-macos-intel-x86_64
            sudo mv neuron-macos-intel-x86_64 /usr/local/bin/neuron
            ```
          files: |
            ./artifacts/neuron-windows-x86_64/neuron-windows-x86_64.exe
            ./artifacts/neuron-macos-arm64/neuron-macos-arm64
            ./artifacts/neuron-macos-intel-x86_64/neuron-macos-intel-x86_64
          draft: false
          prerelease: false
