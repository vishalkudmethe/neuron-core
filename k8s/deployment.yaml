# ─────────────────────────────────────────────────────────────────────────────
# AI-NEURON™  —  Kubernetes Deployment Manifests
# Pillar 3: Enterprise Cloud-Native Deployment
#
# Apply:   kubectl apply -f k8s/deployment.yaml
# Delete:  kubectl delete -f k8s/deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: ai-neuron
  labels:
    app.kubernetes.io/name: ai-neuron
    app.kubernetes.io/version: "1.0.0"

---

# ── PersistentVolumeClaim — stores .neuron/ data across pod restarts ──────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neuron-data-pvc
  namespace: ai-neuron
  labels:
    app: ai-neuron
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi

---

# ── ConfigMap — runtime configuration ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-neuron-config
  namespace: ai-neuron
data:
  NEURON_LOG_LEVEL: "info"
  NEURON_PORT: "8080"

---

# ── Secret — enterprise license key (base64 encoded) ─────────────────────────
# Replace <BASE64_LICENSE_KEY> with: echo -n "AINEURON-ENT-..." | base64
apiVersion: v1
kind: Secret
metadata:
  name: ai-neuron-license
  namespace: ai-neuron
type: Opaque
data:
  AINEURON_LICENSE_KEY: ""   # base64-encoded license key

---

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-neuron
  namespace: ai-neuron
  labels:
    app: ai-neuron
    version: "1.0.0"
    tier: enterprise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-neuron
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ai-neuron
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: ai-neuron
          image: ghcr.io/vishalkudmethe/ai-neuron:latest
          imagePullPolicy: Always
          command: ["ai-neuron", "start-server"]
          args: ["--port", "8080"]

          ports:
            - name: mcp-tcp
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: ai-neuron-config
          env:
            - name: AINEURON_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-neuron-license
                  key: AINEURON_LICENSE_KEY
                  optional: true

          volumeMounts:
            - name: neuron-data
              mountPath: /root/.neuron
            - name: workspace
              mountPath: /workspace
              readOnly: true

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          livenessProbe:
            exec:
              command: ["ai-neuron", "status"]
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            allowPrivilegeEscalation: false

      volumes:
        - name: neuron-data
          persistentVolumeClaim:
            claimName: neuron-data-pvc
        - name: workspace
          emptyDir: {}

      restartPolicy: Always

---

# ── Service — exposes TCP MCP port within the cluster ────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ai-neuron-svc
  namespace: ai-neuron
  labels:
    app: ai-neuron
spec:
  selector:
    app: ai-neuron
  ports:
    - name: mcp-tcp
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---

# ── HorizontalPodAutoscaler — scale out under enterprise load ─────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-neuron-hpa
  namespace: ai-neuron
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-neuron
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
